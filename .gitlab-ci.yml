default:
  tags:
    - kubernetes-executor

variables:
  GITLAB_SUBGROUP: "sre"
  DEPARTMENT: "digital"
  # Standard Node.js setup
  NODE_VERSION: "18.17.0"
  PNPM_HOME: "${CI_PROJECT_DIR}/.pnpm-store"
  NPM_CONFIG_PREFIX: "${CI_PROJECT_DIR}/.npm-global"
  # ECR Configuration
  AWS_REGION: "eu-west-1"
  REGISTRY_URL: "012966899965.dkr.ecr.eu-west-1.amazonaws.com"
  REGISTRY_PATH: "n8n-portal"

image: node:${NODE_VERSION}

stages:
  - build
  - test
  - lint
  - build_image

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

before_script:
  - npm ci

build:
  stage: build
  script:
    - npm run build
  artifacts:
    expire_in: 1 day
    paths:
      - .next/

lint:
  stage: lint
  script:
    - npm run lint

build_image:
  stage: build_image
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script: [] # Don't run npm ci here
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"credsStore\":\"ecr-login\"}" > /kaniko/.docker/config.json
    - /kaniko/executor --context ${CI_PROJECT_DIR} --dockerfile ${CI_PROJECT_DIR}/Dockerfile --destination ${REGISTRY_URL}/${REGISTRY_PATH}:${CI_COMMIT_SHORT_SHA} --destination ${REGISTRY_URL}/${REGISTRY_PATH}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
