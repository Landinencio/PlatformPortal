variables:
  GITLAB_SUBGROUP: "sre"
  DEPARTMENT: "digital"
  # Standard Node.js setup
  NODE_VERSION: "18.17.0"
  PNPM_HOME: "${CI_PROJECT_DIR}/.pnpm-store"
  NPM_CONFIG_PREFIX: "${CI_PROJECT_DIR}/.npm-global"
  # ECR Configuration
  AWS_REGION: "eu-west-1"
  REGISTRY_URL: "012966899965.dkr.ecr.eu-west-1.amazonaws.com"
  REGISTRY_PATH: "n8n-portal"

image: node:${NODE_VERSION}

stages:
  - build
  - test
  - lint
  - build_image

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

before_script:
  - npm ci

build:
  stage: build
  script:
    - npm run build
  artifacts:
    expire_in: 1 day
    paths:
      - .next/

lint:
  stage: lint
  script:
    - npm run lint

build_image:
  stage: build_image
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:v0.3.11
  before_script: [] # Don't run npm ci here
  script:
    - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${REGISTRY_URL}
    - docker build -t ${REGISTRY_URL}/${REGISTRY_PATH}:${CI_COMMIT_SHORT_SHA} .
    - docker build -t ${REGISTRY_URL}/${REGISTRY_PATH}:latest .
    - docker push ${REGISTRY_URL}/${REGISTRY_PATH}:${CI_COMMIT_SHORT_SHA}
    - docker push ${REGISTRY_URL}/${REGISTRY_PATH}:latest
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
