# Platform Portal CI/CD Pipeline
# Includes testing, SonarQube analysis, and ECR image push


include:
  - project: 'iskaypetcom/sre-infra/tools/cicd/gitlab-ci-toolkit'
    ref: main
    file: 'CI/build.yml'

default:
  tags:
    - kubernetes-executor

variables:
  NODE_VERSION: "18-alpine"
  AWS_REGION: "eu-west-1"
  AWS_EC2_METADATA_DISABLED: "true"
  AWS_SDK_LOAD_CONFIG: "true"
  # Use TOOLING account credentials for ECR (012966899965)
  AWS_ACCESS_KEY_ID: ${AWS_TOOLING_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_TOOLING_SECRET_ACCESS_KEY}
  AWS_ECR_ACCOUNT_ID: "012966899965"
  REGISTRY_URL: "${AWS_ECR_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  REGISTRY_PATH: "n8n-portal"
  SONAR_TOKEN: ${SQ_TOKEN}
  SONAR_HOST_URL: "https://sonarqube.tooling.dp.iskaypet.com/"
  SONAR_PROJECT_KEY: "platformportal"

stages:
  - install
  - test
  - security_scan
  - versioning_release_candidate
  - build_image
  - versioning_release

.npm-cache:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push


install_deps:
  stage: install
  image: node:${NODE_VERSION}
  extends: .npm-cache
  script:
    - npm ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


lint_check:
  stage: test
  image: node:${NODE_VERSION}
  extends: .npm-cache
  needs: [install_deps]
  script:
    - npm run lint
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


build_check:
  stage: test
  image: node:${NODE_VERSION}
  extends: .npm-cache
  needs: [install_deps]
  script:
    - npm run build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH


sonar_scanning:
  stage: security_scan
  image: docker.io/sonarsource/sonar-scanner-cli:11.5
  needs: [build_check]
  script:
    - |
      sonar-scanner -X \
        -Dsonar.qualitygate.wait=true \
        -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
        -Dsonar.sources=src \
        -Dsonar.exclusions=node_modules/**,**/*.test.ts,**/*.test.tsx,.next/** \
        -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info \
        -Dsonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx \
        -Dsonar.coverage.exclusions=**/*.yaml,**/*.json,**/*.css
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Override create_ecr_repo from toolkit - repo already exists
create_ecr_repo:
  stage: versioning_release_candidate
  image: alpine:3.20
  script:
    - echo "ECR repository n8n-portal already exists, skipping creation"
  only:
    refs:
      - main
    variables:
      - $CI_COMMIT_BRANCH == "main"

# Override tag_release_candidate to use CI_JOB_TOKEN for this repo
tag_release_candidate:
  stage: versioning_release_candidate
  image: ${REGISTRY_URL}/iskaypet/digital/tools/ci/semver-toolkit:${SEMVER_TOOLKIT_VERSION}
  variables:
    SEMVER_TOOLKIT_VERSION: "latest"
    GIT_DEPTH: 0
  before_script:
    - git config --global user.email "ci@iskaypet.com"
    - git config --global user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CICD_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
  script:
    - /root/bin/gitlab-calculate-tags.sh
    - source ./semver-tags.env
    - /root/bin/gitlab-tag.sh ${GIT_RC_TAG}
  artifacts:
    reports:
      dotenv: semver-tags.env
  only:
    refs:
      - main
    variables:
      - $CI_COMMIT_BRANCH == "main"
