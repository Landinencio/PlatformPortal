# Vertical Pod Autoscaler values shared between dp-dev and dp-uat (and dp-prod).
#
# Chart: autoscaler/vertical-pod-autoscaler 0.9.0 (app version 1.6.0)
# Source: https://github.com/kubernetes/autoscaler/tree/master/charts/vertical-pod-autoscaler
#
# Apply per cluster:
#   helm --kube-context <ctx> upgrade --install vpa autoscaler/vertical-pod-autoscaler \
#     --version 0.9.0 -n kube-system -f ops/k8s/vpa-values.yaml
#
# Notes:
#   - certGen Job creates the `vpa-tls-certs` secret automatically (same name expected by the deployments).
#   - registerWebhook=true so the chart manages the MutatingWebhookConfiguration (avoids risk of admission
#     controller having permission to delete webhooks at runtime).
#   - All recommendations from existing VPAs in dp-dev stay in `Off` mode by default — VPA only emits
#     recommendations, never mutates pods, until each VPA explicitly opts into Auto/Initial/InPlaceOrRecreate.
#
# We keep replicas to 1 for recommender/updater (single-leader anyway) and 2 for the admission controller
# for HA on its webhook path.

recommender:
  enabled: true
  replicas: 1
  image:
    repository: registry.k8s.io/autoscaling/vpa-recommender
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 500Mi
    limits:
      cpu: 200m
      memory: 1000Mi
  # Expose the prometheus metrics port (matches existing port name in dp-dev).
  service:
    enabled: true
    ports:
      - port: 8942
        protocol: TCP
        targetPort: prometheus
        name: prometheus

updater:
  enabled: true
  replicas: 1
  image:
    repository: registry.k8s.io/autoscaling/vpa-updater
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 500Mi
    limits:
      cpu: 200m
      memory: 1000Mi

admissionController:
  enabled: true
  replicas: 2
  image:
    repository: registry.k8s.io/autoscaling/vpa-admission-controller
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      cpu: 200m
      memory: 500Mi
  # The admission controller registers its own MutatingWebhookConfiguration at startup
  # using the TLS material generated by the certGen Job. We don't enable Helm-managed
  # webhook here to keep the auto-renewal flow simple.
  registerWebhook: false
  certGen:
    enabled: true
  mutatingWebhookConfiguration:
    failurePolicy: Ignore
