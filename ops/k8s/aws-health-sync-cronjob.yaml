apiVersion: batch/v1
kind: CronJob
metadata:
  name: aws-health-sync
  namespace: n8n
spec:
  # Every 15 minutes: poll the portal-aws-health-events SQS queue and upsert the
  # aws.health events (issue / scheduledChange / accountNotification) into
  # aws_health_events. Upsert by event ARN, so at-least-once SQS redelivery and
  # retries never duplicate rows.
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: aws-health-sync
        spec:
          restartPolicy: OnFailure
          containers:
          - name: aws-health-sync
            image: curlimages/curl:latest
            imagePullPolicy: Always
            env:
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: platformportal-secrets
                  key: INTERNAL_API_SECRET
            command:
            - /bin/sh
            - -c
            - |
              echo "Starting AWS health sync..."
              echo "Date: $(date)"

              STATUS=$(curl -X POST \
                -H "Content-Type: application/json" \
                -H "x-internal-secret: ${INTERNAL_API_SECRET}" \
                -w "%{http_code}" \
                -s -o /tmp/response.json \
                --max-time 120 \
                http://n8n-webhooks.n8n.svc.cluster.local:3000/api/aws-health/sync)

              echo ""
              echo "HTTP Status: $STATUS"
              cat /tmp/response.json
              echo ""

              if [ "$STATUS" != "200" ]; then
                echo "ERROR: aws-health sync failed with status $STATUS"
                exit 1
              fi

              echo "AWS health sync completed successfully!"
