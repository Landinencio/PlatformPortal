apiVersion: v1
kind: ConfigMap
metadata:
  name: dora-backfill-script
  namespace: n8n
data:
  backfill.js: |
    const http = require('http');
    const DELAY_MS = 30_000;
    const DATES = [
      '2025-09-27', '2025-09-28', '2025-09-29', '2025-09-30',
      '2025-10-01', '2025-10-02', '2025-10-03', '2025-10-04', '2025-10-05', '2025-10-06', '2025-10-07',
      '2025-10-08', '2025-10-09', '2025-10-10', '2025-10-11', '2025-10-12', '2025-10-13', '2025-10-14',
      '2025-10-15', '2025-10-16', '2025-10-17', '2025-10-18', '2025-10-19', '2025-10-20', '2025-10-21',
      '2025-10-22', '2025-10-23', '2025-10-24', '2025-10-25', '2025-10-26', '2025-10-27', '2025-10-28',
      '2025-10-29', '2025-10-30', '2025-10-31',
      '2025-11-01', '2025-11-02', '2025-11-03', '2025-11-04', '2025-11-05', '2025-11-06', '2025-11-07',
      '2025-11-08', '2025-11-09', '2025-11-10', '2025-11-11', '2025-11-12', '2025-11-13', '2025-11-14', '2025-11-15',
      '2026-03-07', '2026-03-08', '2026-03-13', '2026-03-14', '2026-03-15', '2026-03-16'
    ];
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    
    // Check if Next.js is ready
    async function waitForNextJs() {
      console.log('Waiting for Next.js to start...');
      let ready = false;
      while (!ready) {
        try {
          await new Promise((resolve, reject) => {
            const req = http.request({ hostname: 'localhost', port: 3000, path: '/api/health', method: 'GET' }, res => resolve());
            req.on('error', reject);
            req.end();
          });
          ready = true;
          console.log('Next.js is up!');
        } catch(e) {
          await sleep(5000);
        }
      }
    }

    function snap(date) {
      return new Promise((resolve, reject) => {
        const req = http.request({
          hostname: 'localhost', port: 3000,
          path: `/api/metrics/snapshot?date=${date}`,
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        }, res => {
          let b = '';
          res.on('data', c => b += c);
          res.on('end', () => { 
            try { 
              resolve({ status: res.statusCode, data: JSON.parse(b) }); 
            } catch { 
              resolve({ status: res.statusCode, data: { success: false, raw: b } }); 
            } 
          });
        });
        req.setTimeout(3600000, () => req.destroy(new Error('timeout')));
        req.on('error', reject);
        req.end();
      });
    }

    async function main() {
      await waitForNextJs();
      const N = DATES.length;
      console.log(`Backfill ${N} dates | ${new Date().toISOString()}\n`);
      let ok=0, fail=0;
      for (let i=0; i<N; i++) {
        const t0 = Date.now();
        let retries = 3;
        let success = false;
        while (retries > 0 && !success) {
          try {
            const res = await snap(DATES[i]);
            const s = ((Date.now()-t0)/1000)|0;
            const d = res.data;
            if (res.status === 200 && (d.success || d.projectsProcessed !== undefined)) {
               console.log(`[${i+1}/${N}] ${DATES[i]} ✓ ${d.projectsProcessed||0}p ${s}s`);
               ok++;
               success = true;
            } else {
               throw new Error(`HTTP ${res.status} - ${JSON.stringify(d)}`);
            }
          } catch(e) {
            console.error(`[${i+1}/${N}] ${DATES[i]} attempt failed: ${e.message} ${((Date.now()-t0)/1000)|0}s`);
            retries--;
            if (retries > 0) {
              console.log(`Retrying... (${retries} left)`);
              await sleep(15000);
            }
          }
        }
        if (!success) {
          console.error(`[${i+1}/${N}] ${DATES[i]} ✗ ALL RETRIES FAILED`);
          fail++;
        }
        if (i<N-1) await sleep(DELAY_MS);
      }
      console.log(`\nDone ${new Date().toISOString()} | OK:${ok} FAIL:${fail}`);
      process.exit(fail === 0 ? 0 : 1);
    }
    main();
